<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Code Hush</title>
    <link rel="stylesheet" href="assets/css/LandR/register.css" />
    <meta
      name="description"
      content="Enter the email address or mobile phone number associated with your Code Hush account."
    />
    <meta
      name="keywords"
      content="Code Hush, code hush, CodeHush, codehush, CODEHUSH, CODE HUSH, chat, Chat, CHAT, HUSH, hush, Hush, Chat Hush, chat hush, CHAT HUSH, chathush, CHATHUSH, ChatHush, Code, CODE, text, TEXT, Text, forgot password, forgot, password, PASSWORD, FORGOT, FORGOT PASSWORD, PASSWORD FORGOT, login, LOGIN, codehush login, code hush login, register, login code hush"
    />
    <link
      rel="apple-touch-icon"
     sizes="180x180"
      href="assets/img/favicon/Android Chrome/icons8-quarantine-outline-gradient-96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicon/Web/icons8-quarantine-outline-gradient-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicon/Web/icons8-quarantine-outline-gradient-16.png"
    />
    <link
     rel="manifest"
     href="assets/img/favicon/Android Chrome/manifest.json"
    />
  </head>

  <body>
    <!-- <div class="alert-btn">
        <p class="alert">Invalid Email!</p>
    </div> -->

    <div class="alert">
      <span class="closebtn" onclick="this.parentElement.style.display='none';"
        >&times;</span
      >
      Invalid Credentials
    </div>
    <div class="alert success">
      <span class="closebtn" onclick="this.parentElement.style.display='none';"
        >&times;</span
      >
      Registered Successfully
    </div>

    <div class="container">
      <div class="login-box">
        <form action="" method="post">
          <div class="page-box">
            <div class="login-title">
              <h2>Register</h2>
              <p>Please create an account</p>
            </div>
            <div class="page email-page">
              <div class="input-box">
                <input type="name" name="name" autofocus required />
                <label>Enter your name</label>
              </div>
              <br />
              <div class="input-box">
                <input type="email" name="email" autofocus required />
                <label>Enter your email</label>
              </div>
              <br />
              <div class="input-box">
                <input type="number" name="number" autofocus/>
                <label>Enter your number (Optional)</label>
              </div>
              <br />
            </div>
          </div>
          <div class="page email-page">
            <div class="input-box">
              <input type="password" name="password" autofocus required />
              <label>Create your password</label>
            </div>
            <br />
            <div class="input-box">
              <input type="password" name="cpassword" autofocus required />
              <label>Confirm password</label>
            </div>
            <br />
          </div>

          <div class="btn-box button-container">
            <p style="font-size: 14.5px; color: #fff; text-decoration: none">
              Already have an account?&nbsp;<a href="https://codehush.com/login"
                >Login</a
              >
            </p>
            <button class="btn-next">Create</button>
          </div>
        </form>
      </div>
    </div>
    <script src="assets/js/LandR/register.js"></script>
  </body>
</html>
