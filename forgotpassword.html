<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="assets/css/LandR/login.css" />
    <link
    rel="apple-touch-icon"
   sizes="180x180"
    href="assets/img/favicon/Android Chrome/icons8-quarantine-outline-gradient-96.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"

  />
  <link
    rel="icon"
    type="image/png"
    sizes="16x16"

  />

   rel="manifest"
   href="assets/img/favicon/Android Chrome/manifest.json"
  />
  </head>

  <body>
    <div class="container">
      <div class="login-box">
        <form action="#">
          <div class="page-box">
            <div class="back-btn">
              <a href="#"><button class="btn-next">Back</button></a>
            </div>
            <div class="login-title">
              <h2>Forgot Password</h2>
              <p>Enter the email address or mobile phone number associated with your Code Hush account.</p>
            </div>
            <div class="page email-page">
              <div class="input-box">
                <input type="email" class="email" autofocus required />
                <label>Email or phone number</label>
              </div>
            </div>
            <div class="guest-mode"></div>
            <div class="btn-box"></div>
          </div>
          <div class="guest-mode">
            <p>Has your email or mobile number changed?</p>
            <a href="#" target="_blank">Learn more</a>
          </div>
          <div class="btn-box button-container">
            <p style="font-size: 14.5px; color: #fff; text-decoration: none">
              Need an account?&nbsp;<a href="https://codehush.com/register"
                >Sign up</a
              >
            </p>
            <button class="btn-next">Next</button>
          </div>
        </form>
      </div>
    </div>
    <script src="assets/js/LandR/login.js"></script>
  </body>
