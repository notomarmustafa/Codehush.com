<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon/windows/code-hush-windows-70.png" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <meta
      name="keywords"
      content="Code Hush, code hush, CodeHush, codehush, CODEHUSH, CODE HUSH, chat, Chat, CHAT, HUSH, hush, Hush, Chat Hush, chat hush, CHAT HUSH, chathush, CHATHUSH, ChatHush, Code, CODE, text, TEXT, Text, contact, CONTACT, Contact, contact form, form, CONTACT FORM, Contact Form"
    />
    <link
      rel="apple-touch-icon"
     sizes="180x180"
      href="assets/img/favicon/Android Chrome/icons8-quarantine-outline-gradient-96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicon/Web/icons8-quarantine-outline-gradient-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicon/Web/icons8-quarantine-outline-gradient-16.png"
    />
    <link
     rel="manifest"
     href="assets/img/favicon/Android Chrome/manifest.json"
    />
    <title>Contact Us</title>
  </head>

  <body>

    <section class="contact" id="contact">
      <h2 class="heading">
        Contact <span>Us!</span
        >
      </h2>
      <form>
        <div class="input-box">
          <div class="input-field">
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Full Name"
              required
            />
            <span class="focus"></span>
          </div>
          <div class="input-field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email Address"
              required
            />
            <span class="focus"></span>
          </div>
        </div>

        <div class="input-box">
          <div class="input-field">
            <input
              type="number"
              id="phone"
              name="phone"
              placeholder="Mobile Number"
              required
            />
            <span class="focus"></span>
          </div>
          <div class="input-field">
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="Subject"
              required
              autocomplete="off"
            />
            <span class="focus"></span>
          </div>
        </div>

        <div class="textarea-field">
          <textarea
            id="message"
            cols="30"
            rows="10"
            name="message"
            placeholder="Your Message"
            required
          ></textarea>
          <span class="focus"></span>
        </div>

        <div class="btn-box btns">
          <button onclick="SendMail()" name="submit" class="btn">Submit</button>
        </div>
      </form>
    </section>

    <script src="assets/js/script.js" type="text/JavaScript"></script>
  </body>
</html>
